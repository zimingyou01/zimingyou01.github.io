<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      } catch (error) {}
    })();
  </script>
  <title>{{ site.data.main_info.name }} | {% if page.title == "Home" %}Homepage{% else %}{{ page.title }}{% endif %}</title>
  <meta name="description" content="{{ site.data.main_info.meta_description }}">
  <meta name="author" content="{{ site.data.main_info.name }}">
  <meta property="og:title" content="{{ site.data.main_info.name }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://zimingyou01.github.io/">
  <meta property="og:site_name" content="{{ site.data.main_info.name }}">
  <meta property="og:description" content="{{ site.data.main_info.meta_description }}">
  <link rel="canonical" href="https://zimingyou01.github.io/">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | prepend: site.baseurl }}">

  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | prepend: site.baseurl }}">
  <link rel="shortcut icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | prepend: site.baseurl }}">
</head>
<body>
  <main class="page-shell">
    {{ content }}
  </main>

  <script>
    (function () {
      var button = document.querySelector("[data-theme-toggle]");
      if (!button) return;

      function setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        button.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
        try {
          if (theme === "dark") {
            localStorage.setItem("theme", "dark");
          } else {
            localStorage.removeItem("theme");
          }
        } catch (error) {}
      }

      button.addEventListener("click", function () {
        var current = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
        setTheme(current === "dark" ? "light" : "dark");
      });
      setTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light");
    })();
  </script>

  {% include google_analytics.html %}
</body>
</html>
